<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FN Pulse — Island & Creator Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#070710;--card:#0f0f1a;--card-h:#151524;--elev:#1a1a2e;
--ac:#00e5ff;--ag:rgba(0,229,255,.2);--ad:rgba(0,229,255,.07);
--pk:#ff3cac;--pg:rgba(255,60,172,.15);
--gn:#22c55e;--rd:#ef4444;--or:#f59e0b;
--t1:#eaeaf0;--t2:#7a7a90;--t3:#44445a;
--bd:rgba(255,255,255,.05);--ba:rgba(0,229,255,.12);
--r:14px;--rs:10px;
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 800px 500px at 10% 0%,rgba(0,229,255,.035) 0%,transparent 70%),radial-gradient(ellipse 600px 600px at 90% 90%,rgba(255,60,172,.025) 0%,transparent 70%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:1rem 1.25rem}
.header{text-align:center;padding:2rem 0 .75rem}
.logo{display:inline-flex;align-items:center;gap:.55rem;font-size:1.85rem;font-weight:900;letter-spacing:-.03em;background:linear-gradient(135deg,var(--ac),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo .dot{width:9px;height:9px;background:var(--ac);border-radius:50%;animation:pulse 2s infinite;box-shadow:0 0 10px var(--ag)}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.35}}
.hsub{color:var(--t2);font-size:.82rem;margin-top:.25rem}

/* Live indicator */
.live-ind{display:inline-flex;align-items:center;gap:.35rem;font-size:.65rem;color:var(--gn);font-weight:600;margin-top:.4rem}
.live-dot{width:6px;height:6px;background:var(--gn);border-radius:50%;animation:pulse 1.5s infinite}
.refresh-timer{color:var(--t3);font-size:.6rem;margin-left:.5rem}

.tnav{display:flex;justify-content:center;gap:3px;margin:1rem auto 1.5rem;background:var(--card);border:1px solid var(--bd);border-radius:100px;padding:3px;max-width:500px}
.tb{flex:1;padding:.55rem .7rem;font-family:'Outfit',sans-serif;font-weight:600;font-size:.78rem;border:none;background:0;color:var(--t2);border-radius:100px;cursor:pointer;transition:.3s;white-space:nowrap}
.tb:hover{color:var(--t1)}
.tb.active{background:linear-gradient(135deg,var(--ac),rgba(0,229,255,.6));color:var(--bg);box-shadow:0 3px 14px var(--ag)}
.tb i{margin-right:.3rem;font-size:.7rem}
.pane{display:none;animation:su .3s ease}.pane.active{display:block}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:transform .3s cubic-bezier(.4,0,.2,1),box-shadow .3s,border-color .3s}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 35px rgba(0,0,0,.3),0 0 0 1px var(--ba);border-color:var(--ba)}
.cb{padding:1.1rem}
.stat{background:var(--card);border:1px solid var(--bd);border-radius:var(--rs);padding:.75rem .9rem;text-align:center}
.sl{font-size:.6rem;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);font-weight:600;margin-bottom:.1rem}
.sv{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700}.sv.aclr{color:var(--ac)}

.srch{max-width:560px;margin:0 auto 1.75rem;position:relative}
.srch input{width:100%;padding:.8rem .8rem .8rem 2.6rem;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:500;background:var(--card);border:1px solid var(--bd);border-radius:100px;color:var(--t1);outline:0;transition:.3s}
.srch input::placeholder{color:var(--t3)}
.srch input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ad),0 5px 24px rgba(0,0,0,.3)}
.srch .si{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--t3);font-size:.8rem;pointer-events:none}
.srch button{position:absolute;right:4px;top:50%;transform:translateY(-50%);padding:.5rem 1.2rem;font-family:'Outfit',sans-serif;font-weight:700;font-size:.75rem;background:linear-gradient(135deg,var(--ac),rgba(0,229,255,.6));color:var(--bg);border:none;border-radius:100px;cursor:pointer;transition:.2s}
.srch button:hover{transform:translateY(-50%) scale(1.03);box-shadow:0 3px 14px var(--ag)}
.bk{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem 1rem;font-family:'Outfit',sans-serif;font-weight:600;font-size:.73rem;background:var(--elev);border:1px solid var(--bd);color:var(--t2);border-radius:100px;cursor:pointer;margin-bottom:1.1rem;transition:.25s}
.bk:hover{color:var(--ac);border-color:var(--ba)}

.stt{font-size:1.3rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.85rem}.stt .ac{color:var(--ac)}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:.9rem}
.gf{grid-column:1/-1}
@media(max-width:1200px){.g5{grid-template-columns:repeat(4,1fr)}}
@media(max-width:1024px){.g4,.g5{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.g2,.g3,.g4,.g5{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.g2,.g3,.g4,.g5{grid-template-columns:1fr}.tb{font-size:.68rem;padding:.45rem .4rem}.tb i{display:none}}

/* Map card */
.mc{cursor:pointer;position:relative}
.mc .iw{overflow:hidden;border-radius:var(--r) var(--r) 0 0;position:relative}
.mc .iw::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(to top,var(--card),transparent);pointer-events:none}
.mc img.mi{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;transition:transform .4s cubic-bezier(.4,0,.2,1)}
.mc:hover img.mi{transform:scale(1.05)}
.mc .pn{position:absolute;top:.5rem;left:.5rem;font-family:'Space Mono',monospace;font-size:.55rem;font-weight:700;background:rgba(0,0,0,.5);color:var(--t1);padding:.12rem .4rem;border-radius:4px;z-index:2;backdrop-filter:blur(4px)}
.mc .ccb{position:absolute;bottom:.45rem;left:.55rem;display:flex;align-items:center;gap:.25rem;font-family:'Space Mono',monospace;font-size:.65rem;font-weight:700;color:var(--ac);z-index:2;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.mc .mm{padding:.7rem .8rem}
.mc .mn{font-weight:700;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.1rem}
.mc .mcr{font-size:.68rem;color:var(--t2)}
.mc .mcr span{color:var(--t1);cursor:pointer;transition:.2s}
.mc .mcr span:hover{color:var(--ac)}
.mc .mt{display:flex;flex-wrap:wrap;gap:.2rem;margin-top:.4rem}
.mc .mtg{font-size:.5rem;padding:.1rem .35rem;background:var(--ad);color:var(--ac);border-radius:100px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}

.psec{margin-bottom:2rem}
.ptr{display:flex;align-items:center;gap:.5rem;margin-bottom:.7rem;padding-bottom:.4rem;border-bottom:1px solid var(--bd)}
.pnm{font-size:1rem;font-weight:800;background:linear-gradient(135deg,var(--ac),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pcnt{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--t3);font-weight:600}
.ppl{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--ac);font-weight:600;margin-left:auto}

.dm{display:flex;flex-wrap:wrap;gap:.35rem;justify-content:center;margin-bottom:1.5rem}
.dmc{font-size:.6rem;padding:.25rem .6rem;background:var(--card);border:1px solid var(--bd);border-radius:100px;color:var(--t3)}
.dmc strong{color:var(--t2);font-weight:600}

.dt{width:100%;border-collapse:collapse;font-size:.73rem}
.dt thead th{text-align:left;padding:.55rem .75rem;font-size:.58rem;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);font-weight:700;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--card);z-index:2}
.dt tbody td{padding:.45rem .75rem;border-bottom:1px solid var(--bd);color:var(--t2)}
.dt tbody tr:hover td{background:var(--ad);color:var(--t1)}
.dt .lr td{background:rgba(255,60,172,.05);border-left:3px solid var(--pk)}
.lt{display:inline-block;background:var(--pk);color:#fff;font-size:.53rem;font-weight:700;padding:.1rem .4rem;border-radius:100px;text-transform:uppercase}

.cli{position:relative;padding:.75rem .9rem;background:var(--elev);border-radius:var(--rs);border-left:3px solid var(--ac);margin-bottom:.5rem}
.clv{font-weight:700;color:var(--t1);font-size:.85rem;margin-bottom:.05rem}
.cld{font-size:.65rem;color:var(--t3);margin-bottom:.35rem}
.clc{font-size:.73rem;color:var(--t2);list-style:none}
.clc li{margin-bottom:.12rem}.clc li::before{content:'→ ';color:var(--ac);font-weight:700}
.cldl{font-size:.68rem;color:var(--t3);margin-top:.2rem;padding-left:1rem}
.cldl .bef{color:var(--rd);text-decoration:line-through}.cldl .aft{color:var(--gn)}

.img-cmp-btn{display:inline-flex;align-items:center;gap:.3rem;margin-top:.35rem;padding:.35rem .7rem;font-family:'Outfit',sans-serif;font-size:.68rem;font-weight:600;background:linear-gradient(135deg,var(--ac),rgba(0,229,255,.5));color:var(--bg);border:none;border-radius:100px;cursor:pointer;transition:.2s}
.img-cmp-btn:hover{transform:scale(1.03);box-shadow:0 3px 12px var(--ag)}
.img-cmp-btn i{font-size:.6rem}

/* Time display */
.tdisp{display:inline-flex;flex-direction:column;gap:0}
.tdisp .td-date{font-size:inherit;color:inherit}
.tdisp .td-ago{font-size:.6rem;color:var(--ac);font-weight:600;font-family:'Space Mono',monospace;white-space:nowrap}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.mo.open{opacity:1;pointer-events:all}
.mbox{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);max-width:900px;width:95%;max-height:90vh;overflow:hidden;transform:scale(.92);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.mo.open .mbox{transform:scale(1)}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:.85rem 1.1rem;border-bottom:1px solid var(--bd)}
.mhdr h3{font-size:1rem;font-weight:700}
.mcls{background:0;border:0;color:var(--t2);font-size:1.1rem;cursor:pointer;transition:.2s;padding:.3rem}
.mcls:hover{color:var(--ac)}
.mbdy{padding:1.1rem;overflow-y:auto;max-height:calc(90vh - 60px)}
.cw{position:relative;width:100%;aspect-ratio:16/9;border-radius:var(--rs);overflow:hidden;cursor:col-resize;user-select:none}
.cw img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.cw .cb4{clip-path:inset(0 50% 0 0)}.cw .ca4{clip-path:inset(0 0 0 50%)}
.csl{position:absolute;top:0;bottom:0;left:50%;width:3px;background:var(--ac);z-index:5;pointer-events:none;box-shadow:0 0 8px var(--ag)}
.csl::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;background:var(--ac);border-radius:50%;box-shadow:0 0 16px var(--ag)}
.csl::after{content:'⇔';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.8rem;font-weight:900;color:var(--bg);z-index:6}
.clbs{display:flex;justify-content:space-between;margin-top:.6rem}
.clb{font-size:.7rem;font-weight:600;padding:.3rem .7rem;border-radius:100px}
.clb.bf{background:rgba(239,68,68,.15);color:var(--rd)}.clb.af{background:rgba(34,197,94,.15);color:var(--gn)}

/* Creator */
.crh{position:relative;padding:1.75rem 1.25rem;text-align:center;display:flex;flex-direction:column;align-items:center;overflow:hidden;border-radius:var(--r)}
.crbn{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;opacity:.22;z-index:0}
.crov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,7,16,.25),rgba(7,7,16,.95));z-index:1}
.crh>*:not(.crbn):not(.crov){position:relative;z-index:2}
.crav{width:80px;height:80px;border-radius:50%;border:3px solid var(--ac);box-shadow:0 0 20px var(--ag);object-fit:cover}
.crnm{font-size:1.3rem;font-weight:800;margin-top:.7rem}
.crhd{font-size:.75rem;color:var(--t3);font-family:'Space Mono',monospace}
.crst{display:flex;gap:1.25rem;margin-top:.6rem;font-size:.78rem;color:var(--t2);flex-wrap:wrap;justify-content:center}
.crst i{color:var(--ac);margin-right:.25rem}
.crbio{color:var(--t2);font-size:.8rem;margin-top:.5rem;max-width:460px;line-height:1.5;white-space:pre-wrap}
.crsc{display:flex;gap:.5rem;margin-top:.7rem}
.crsc a{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--elev);border:1px solid var(--bd);border-radius:50%;color:var(--t2);font-size:.8rem;transition:.25s;text-decoration:none}
.crsc a:hover{color:var(--ac);border-color:var(--ac);transform:translateY(-2px)}

.det-img{width:100%;aspect-ratio:16/8;object-fit:cover;border-radius:var(--r);display:block;margin-bottom:.9rem}
.det-ttl{font-size:1.5rem;font-weight:900;letter-spacing:-.02em;background:linear-gradient(135deg,var(--ac),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.det-id{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--t3);margin-top:.08rem}
.det-cr{display:flex;align-items:center;gap:.6rem;margin:.7rem 0;cursor:pointer;padding:.4rem;border-radius:var(--rs);transition:.2s}
.det-cr:hover{background:var(--ad)}
.det-cr img{width:34px;height:34px;border-radius:50%;border:2px solid var(--bd)}
.det-cr .dn{font-weight:600;font-size:.8rem}.det-cr .dc{font-size:.65rem;color:var(--t3);font-family:'Space Mono',monospace}
.det-tl{color:var(--t2);font-size:.8rem;line-height:1.55;margin:.5rem 0 .85rem;white-space:pre-wrap}
.det-tags{display:flex;flex-wrap:wrap;gap:.25rem;margin-bottom:.85rem}
.det-tag{font-size:.55rem;padding:.12rem .42rem;background:var(--ad);color:var(--ac);border-radius:100px;font-weight:600;text-transform:uppercase}
.info-row{display:flex;flex-wrap:wrap;gap:.4rem;margin:.6rem 0}
.info-chip{font-size:.6rem;padding:.2rem .5rem;background:var(--elev);border:1px solid var(--bd);border-radius:100px;color:var(--t2);display:inline-flex;align-items:center;gap:.25rem}
.info-chip i{color:var(--ac);font-size:.55rem}

.chw{background:var(--card);border:1px solid var(--bd);border-radius:var(--rs);padding:.85rem;margin-top:.85rem}
.chw canvas{max-height:200px}
.cht{font-size:.72rem;font-weight:700;color:var(--t2);margin-bottom:.5rem;display:flex;align-items:center;gap:.3rem}
.cht i{color:var(--ac);font-size:.65rem}

.sy{max-height:480px;overflow-y:auto}
.sy::-webkit-scrollbar{width:3px}.sy::-webkit-scrollbar-track{background:0}.sy::-webkit-scrollbar-thumb{background:var(--t3);border-radius:100px}

.stc{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:2rem;text-align:center}
.sti{font-size:2.2rem;margin-bottom:.6rem}.sti.up{color:var(--ac)}.sti.dwn{color:var(--rd)}
.stl{font-size:1rem;font-weight:700;margin-bottom:.3rem}.sts{font-size:.73rem;color:var(--t3)}

.lw{display:flex;justify-content:center;align-items:center;padding:3rem 0}
.ldr{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{max-width:520px;margin:1.25rem auto;padding:.75rem 1.1rem;background:rgba(255,60,60,.06);border:1px solid rgba(255,60,60,.15);border-radius:var(--rs);color:#ff6b6b;text-align:center;font-weight:500;font-size:.8rem}
.hidden{display:none!important}
.sia{opacity:0;transform:translateY(14px);animation:sif .35s ease forwards}
@keyframes sif{to{opacity:1;transform:translateY(0)}}
.cup{color:var(--gn)!important}.cdn{color:var(--rd)!important}
.mmc{cursor:pointer}.mmc img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block}
.mmc .cb{padding:.6rem .8rem}.mmc .mn{font-size:.78rem}

/* Flash animation for changes */
@keyframes flash{0%{background:var(--ad)}50%{background:rgba(0,229,255,.15)}100%{background:var(--ad)}}
.flash{animation:flash .8s ease}
@keyframes flashCard{0%{box-shadow:0 0 0 0 var(--ag)}50%{box-shadow:0 0 20px 4px var(--ag)}100%{box-shadow:0 0 0 0 var(--ag)}}
.flash-card{animation:flashCard 1s ease}
</style>
</head>
<body>
<div class="app">
<header class="header">
<div class="logo"><span class="dot"></span>FN Pulse</div>
<p class="hsub">Real-time Fortnite island analytics & creator insights</p>
<div class="live-ind"><span class="live-dot"></span>Live · <span id="refreshTimer" class="refresh-timer">Next refresh in --s</span></div>
</header>
<nav class="tnav">
<button class="tb active" data-tab="discovery"><i class="fas fa-compass"></i>Discover</button>
<button class="tb" data-tab="islands"><i class="fas fa-map"></i>Islands</button>
<button class="tb" data-tab="creators"><i class="fas fa-user"></i>Creators</button>
<button class="tb" data-tab="status"><i class="fas fa-signal"></i>Status</button>
</nav>
<div id="tab-content">
<div id="discovery-content" class="pane active">
<h2 class="stt" style="text-align:center"><span class="ac">Featured</span> Islands</h2>
<div id="disco-meta" class="dm"></div>
<div id="disco-maps"></div>
</div>
<div id="islands-content" class="pane">
<div id="isc"><form id="isf" class="srch"><i class="fas fa-search si"></i><input type="text" id="isi" placeholder="Enter island code..." required><button type="submit">Search</button></form></div>
<div id="isr" class="hidden">
<button id="bti" class="bk"><i class="fas fa-arrow-left"></i>New Search</button>
<div class="g2"><div id="md" class="card"></div><div id="mch" class="card"></div><div id="mdh" class="card gf"></div><div id="mmm" class="card gf"></div></div>
</div>
</div>
<div id="creators-content" class="pane">
<div id="csc"><form id="csf" class="srch"><i class="fas fa-user si"></i><input type="text" id="csi" placeholder="Enter creator code..." required><button type="submit">Search</button></form></div>
<div id="csr" class="hidden">
<button id="btc" class="bk"><i class="fas fa-arrow-left"></i>New Search</button>
<div id="cpp" class="card" style="margin-bottom:1.1rem"></div><div id="cmm"></div>
</div>
</div>
<div id="status-content" class="pane">
<div id="ss" class="stc"><div class="lw"><div class="ldr"></div></div></div>
</div>
</div>
<div id="loader" class="lw hidden"><div class="ldr"></div></div>
<div id="error-msg" class="err hidden"></div>
</div>

<div id="cmpModal" class="mo">
<div class="mbox">
<div class="mhdr"><h3 id="cmpTitle">Image Compare</h3><button class="mcls" onclick="closeCmp()"><i class="fas fa-times"></i></button></div>
<div class="mbdy">
<div class="cw" id="cmpW"><img class="cb4" id="cmpB" src=""><img class="ca4" id="cmpA" src=""><div class="csl" id="cmpS"></div></div>
<div class="clbs"><span class="clb bf"><i class="fas fa-arrow-left"></i> Before</span><span class="clb af">After <i class="fas fa-arrow-right"></i></span></div>
</div>
</div>
</div>

<script>
const API='https://api.fn360.gg/api';
const DISCO_REFRESH=60000; // 1 min discovery
const DETAIL_REFRESH=30000; // 30s detail/creator
const STATUS_REFRESH=120000; // 2 min status
let mS=new Map(),autoR=null,charts={},lastRefresh=Date.now(),agoIntervalId=null;

const $=id=>document.getElementById(id);

/* ── Time formatting ── */
function timeAgo(dateStr){
if(!dateStr)return'';
const now=Date.now(),then=new Date(dateStr).getTime(),diff=now-then;
if(diff<0)return'just now';
const s=Math.floor(diff/1000),m=Math.floor(s/60),h=Math.floor(m/60),d=Math.floor(h/24),mo=Math.floor(d/30),y=Math.floor(d/365);
if(s<5)return'just now';
if(s<60)return s+'s ago';
if(m<60)return m+'m '+String(s%60).padStart(2,'0')+'s ago';
if(h<24)return h+'h '+String(m%60).padStart(2,'0')+'m ago';
if(d<30)return d+'d '+String(h%24).padStart(2,'0')+'h ago';

const[cl,disc,more]=await Promise.allSettled([apif(`/maps/${code}/changelog`),apif(`/maps/${code}/discovery`),cid?apif(`/creators/${cid}/maps/more?map_id=${code}&limit=4`):Promise.reject()]);
cl.status==='fulfilled'?showCL(cl.value.data):($('mch').innerHTML=`<div class="cb"><h3 class="stt"><span class="ac">Change</span>log</h3><p style="color:var(--t3)">Could not load.</p></div>`);
disc.status==='fulfilled'?showDH(disc.value.data.results):($('mdh').innerHTML=`<div class="cb"><h3 class="stt"><span class="ac">Discovery</span> History</h3><p style="color:var(--t3)">Could not load.</p></div>`);
more.status==='fulfilled'?showMM(more.value.data,$('mmm')):($('mmm').innerHTML=`<div class="cb"><h3 class="stt">More by <span class="ac">Creator</span></h3><p style="color:var(--t3)">Could not load.</p></div>`);
if(!upd){if(autoR)clearInterval(autoR);autoR=setInterval(()=>sI(code,true),DETAIL_REFRESH)}}
catch{if(!upd)sE(`Island "${code}" not found.`,'islands')}finally{if(!upd)sL(false,'islands')}}

async function sCA(code,upd=false){
code=code.toLowerCase();if(!upd)sL(true,'creators');
try{const[p,m]=await Promise.all([apif(`/creators/${code}`),apif(`/creators/${code}/maps/all`)]);showCP(p.data);showCM(m.data);
if(!upd)$('csr').classList.remove('hidden');if(!upd){if(autoR)clearInterval(autoR);autoR=setInterval(()=>sCA(code,true),DETAIL_REFRESH)}}
catch{if(!upd)sE(`Creator "${code}" not found.`,'creators')}finally{if(!upd)sL(false,'creators')}}

function hU(){if(autoR){clearInterval(autoR);autoR=null}
const hash=location.hash.slice(1)||'discovery',[path,query]=hash.split('?');
document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('active',b.dataset.tab===path));
document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('active',p.id===`${path}-content`));
$('error-msg').classList.add('hidden');$('isr').classList.add('hidden');$('isc').classList.remove('hidden');$('isi').value='';$('csr').classList.add('hidden');$('csc').classList.remove('hidden');$('csi').value='';
if(query){const p=new URLSearchParams(query);
if(path==='islands'&&p.has('code')){$('isi').value=p.get('code');sI(p.get('code'))}
else if(path==='creators'&&p.has('name')){$('csi').value=p.get('name');sCA(p.get('name'))}}}

$('isf').addEventListener('submit',e=>{e.preventDefault();const v=$('isi').value.trim();if(v)location.hash=`#islands?code=${v}`});
$('csf').addEventListener('submit',e=>{e.preventDefault();const v=$('csi').value.trim();if(v)location.hash=`#creators?name=${v}`});
$('bti').addEventListener('click',()=>{location.hash='#islands';if(location.hash==='#islands')hU()});
$('btc').addEventListener('click',()=>{location.hash='#creators';if(location.hash==='#creators')hU()});
document.querySelectorAll('.tb').forEach(b=>b.addEventListener('click',e=>{const t=e.currentTarget.dataset.tab;if(location.hash.split('?')[0]!==`#${t}`)location.hash=`#${t}`}));
window.addEventListener('hashchange',hU);

(function(){
showSt();setInterval(showSt,STATUS_REFRESH);
showDisco();setInterval(()=>showDisco(true),DISCO_REFRESH);
startAgoUpdater();
hU()})();
</script>
</body>
</html>
